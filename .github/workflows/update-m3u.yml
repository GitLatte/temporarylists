name: Liste oluşturucu

on:
  schedule:
    - cron: '0 */2 * * *'  # Her 2 saatte bir çalışır
  workflow_dispatch:  # Elle tetikleme için

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update M3U files
        run: |
          python - <<EOF
          import requests
          import re
          import os
          import hashlib

          def fetch_m3u_content(url):
              try:
                  response = requests.get(url)
                  response.raise_for_status()
                  return response.text
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return None

          def write_file(file_path, content):
              os.makedirs(os.path.dirname(file_path), exist_ok=True)
              with open(file_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"File updated: {file_path}")


          def process_myway_content(content):
              lines = content.split('\n')
              filtered_lines = ['#EXTM3U']
              buffer_lines = []
              logo_url = 'https://raw.githubusercontent.com/GitLatte/temporarylists/refs/heads/main/img/mywaytv.png'
              url_count = 0  # URL sayacı
              current_channel = None  # Mevcut kanal adı

              for line in lines:
                  line = line.strip()
                  if not line or line.startswith('#####'):
                      continue

                  if line.startswith('#EXTINF'):
                      # Yeni kanal başladığında sayacı sıfırla
                      url_count = 0
                      current_channel = line
                      
                      # Önceki kanal için buffer kontrolü
                      if buffer_lines and not any(l.startswith('http') for l in buffer_lines):
                          buffer_lines = []
                      elif buffer_lines:
                          filtered_lines.extend(buffer_lines)
                          buffer_lines = []

                      # TVG etiketi kontrolü
                      if 'tvg-' not in line:
                          # TVG etiketi yoksa tüm özellikleri ekle
                          line = line.replace('#EXTINF:-1', f'#EXTINF:-1 tvg-logo="{logo_url}" tvg-language="Türkçe" tvg-country="TR"')
                      else:
                          # TVG etiketi varsa logo kontrolü ve değiştirme
                          if 'tvg-logo=' in line:
                              # Logo özelliği varsa değiştir
                              line = re.sub('tvg-logo="[^"]*"', f'tvg-logo="{logo_url}"', line)
                          else:
                              # Logo özelliği yoksa ekle
                              line = line.replace('#EXTINF:-1', f'#EXTINF:-1 tvg-logo="{logo_url}"')
                          # Diğer TVG özelliklerini kontrol et ve ekle
                          if 'tvg-language=' not in line:
                              line = line.replace('#EXTINF:-1', '#EXTINF:-1 tvg-language="Türkçe"')
                          if 'tvg-country=' not in line:
                              line = line.replace('#EXTINF:-1', '#EXTINF:-1 tvg-country="TR"')
                      buffer_lines = [line]
                  elif line.startswith('#EXTVLCOPT'):
                      buffer_lines.append(line)
                  elif line.startswith('http'):
                      url_count += 1
                      # İlk URL'yi normal, diğerlerini yorum satırı olarak ekle
                      if url_count == 1:
                          buffer_lines.append(line)
                      else:
                          buffer_lines.append(f'# ? {line}')
                      filtered_lines.extend(buffer_lines)
                      buffer_lines = []

              # Son kanal için buffer kontrolü
              if buffer_lines and any(l.startswith('http') for l in buffer_lines):
                  filtered_lines.extend(buffer_lines)

              return '\n'.join(filtered_lines)

          # Daddylive kanallarını al
          daddylive_content = fetch_m3u_content('${{ secrets.DADDYLIVE_URL }}')
          if daddylive_content:
              lines = daddylive_content.split('\n')
              filtered_lines = ['#EXTM3U']
              turkey_lines = []
              bein_lines = []
              other_lines = {}
              current_group = None
              include_next = False
              buffer_lines = []

              country_translations = {
                  'UNITED STATES': 'Amerika Birleşik Devletleri',
                  'UNITED KINGDOM': 'Birleşik Krallık',
                  'GERMANY': 'Almanya',
                  'FRANCE': 'Fransa',
                  'ITALY': 'İtalya',
                  'SPAIN': 'İspanya',
                  'NETHERLANDS': 'Hollanda',
                  'PORTUGAL': 'Portekiz',
                  'BELGIUM': 'Belçika',
                  'DENMARK': 'Danimarka',
                  'NORWAY': 'Norveç',
                  'SWEDEN': 'İsveç',
                  'FINLAND': 'Finlandiya',
                  'AUSTRIA': 'Avusturya',
                  'SWITZERLAND': 'İsviçre',
                  'GREECE': 'Yunanistan',
                  'POLAND': 'Polonya',
                  'CZECH REPUBLIC': 'Çek Cumhuriyeti',
                  'HUNGARY': 'Macaristan',
                  'ROMANIA': 'Romanya',
                  'BULGARIA': 'Bulgaristan',
                  'CROATIA': 'Hırvatistan',
                  'SERBIA': 'Sırbistan',
                  'SLOVENIA': 'Slovenya',
                  'SLOVAKIA': 'Slovakya',
                  'BOSNIA AND HERZEGOVINA': 'Bosna Hersek',
                  'ALBANIA': 'Arnavutluk',
                  'MACEDONIA': 'Makedonya',
                  'MONTENEGRO': 'Karadağ',
                  'RUSSIA': 'Rusya',
                  'UKRAINE': 'Ukrayna',
                  'BELARUS': 'Belarus',
                  'ESTONIA': 'Estonya',
                  'LATVIA': 'Letonya',
                  'LITHUANIA': 'Litvanya',
                  'TURKEY': 'Türkiye',
                  'QATAR': 'Katar',
                  'UNITED ARAB EMIRATES': 'Birleşik Arap Emirlikleri',
                  'SAUDI ARABIA': 'Suudi Arabistan',
                  'IRAN': 'İran',
                  'ISRAEL': 'İsrail',
                  'EGYPT': 'Mısır',
                  'MOROCCO': 'Fas',
                  'TUNISIA': 'Tunus',
                  'ALGERIA': 'Cezayir',
                  'AFRICA': 'Afrika',
                  'SOUTH AFRICA': 'Güney Afrika',
                  'NIGERIA': 'Nijerya',
                  'KENYA': 'Kenya',
                  'INDIA': 'Hindistan',
                  'PAKISTAN': 'Pakistan',
                  'BANGLADESH': 'Bangladeş',
                  'SRI LANKA': 'Sri Lanka',
                  'NEPAL': 'Nepal',
                  'CHINA': 'Çin',
                  'JAPAN': 'Japonya',
                  'SOUTH KOREA': 'Güney Kore',
                  'THAILAND': 'Tayland',
                  'VIETNAM': 'Vietnam',
                  'INDONESIA': 'Endonezya',
                  'MALAYSIA': 'Malezya',
                  'PHILIPPINES': 'Filipinler',
                  'SINGAPORE': 'Singapur',
                  'AUSTRALIA': 'Avustralya',
                  'NEW ZEALAND': 'Yeni Zelanda',
                  'BRAZIL': 'Brezilya',
                  'ARGENTINA': 'Arjantin',
                  'CHILE': 'Şili',
                  'COLUMBIA': 'Kolombiya',
                  'PERU': 'Peru',
                  'VENEZUELA': 'Venezuela',
                  'MEXICO': 'Meksika',
                  'OTHERS': 'Diğer',
                  'CANADA': 'Kanada',
                  'CYPRUS': 'Kıbrıs',
                  'ICELAND': 'İzlanda',
                  'IRELAND': 'İrlanda'
              }

              language_map = {
                  'UNITED STATES': 'EN',
                  'UNITED KINGDOM': 'EN',
                  'GERMANY': 'DE',
                  'FRANCE': 'FR',
                  'ITALY': 'IT',
                  'SPAIN': 'ES',
                  'NETHERLANDS': 'NL',
                  'PORTUGAL': 'PT',
                  'BELGIUM': 'NL',
                  'DENMARK': 'DA',
                  'NORWAY': 'NO',
                  'SWEDEN': 'SV',
                  'FINLAND': 'FI',
                  'AUSTRIA': 'DE',
                  'SWITZERLAND': 'DE',
                  'GREECE': 'EL',
                  'POLAND': 'PL',
                  'CZECH REPUBLIC': 'CS',
                  'HUNGARY': 'HU',
                  'ROMANIA': 'RO',
                  'BULGARIA': 'BG',
                  'CROATIA': 'HR',
                  'SERBIA': 'SR',
                  'SLOVENIA': 'SL',
                  'SLOVAKIA': 'SK',
                  'BOSNIA AND HERZEGOVINA': 'BS',
                  'ALBANIA': 'SQ',
                  'MACEDONIA': 'MK',
                  'MONTENEGRO': 'ME',
                  'RUSSIA': 'RU',
                  'UKRAINE': 'UK',
                  'BELARUS': 'BE',
                  'ESTONIA': 'ET',
                  'LATVIA': 'LV',
                  'LITHUANIA': 'LT',
                  'TURKEY': 'TR',
                  'QATAR': 'AR',
                  'UNITED ARAB EMIRATES': 'AR',
                  'SAUDI ARABIA': 'AR',
                  'IRAN': 'FA',
                  'ISRAEL': 'HE',
                  'EGYPT': 'AR',
                  'MOROCCO': 'AR',
                  'TUNISIA': 'AR',
                  'ALGERIA': 'AR',
                  'AFRICA': 'EN',
                  'SOUTH AFRICA': 'EN',
                  'NIGERIA': 'EN',
                  'KENYA': 'EN',
                  'INDIA': 'HI',
                  'PAKISTAN': 'UR',
                  'BANGLADESH': 'BN',
                  'SRI LANKA': 'SI',
                  'NEPAL': 'NE',
                  'CHINA': 'ZH',
                  'JAPAN': 'JA',
                  'SOUTH KOREA': 'KO',
                  'THAILAND': 'TH',
                  'VIETNAM': 'VI',
                  'INDONESIA': 'ID',
                  'MALAYSIA': 'MS',
                  'PHILIPPINES': 'FIL',
                  'SINGAPORE': 'EN',
                  'AUSTRALIA': 'EN',
                  'NEW ZEALAND': 'EN',
                  'BRAZIL': 'PT',
                  'ARGENTINA': 'ES',
                  'CHILE': 'ES',
                  'COLUMBIA': 'ES',
                  'PERU': 'ES',
                  'VENEZUELA': 'ES',
                  'MEXICO': 'ES',
                  'OTHERS': 'EN',
                  'CANADA': 'EN',
                  'CYPRUS': 'EL',
                  'ICELAND': 'IS',
                  'IRELAND': 'EN'
              }

              buffer_lines = []
              def add_buffered_lines(target_list):
                  if buffer_lines:
                      target_list.extend(buffer_lines)
                      buffer_lines.clear()

              for line in lines:
                  if line.startswith('#EXTINF'):
                      if buffer_lines:
                          if len(turkey_lines) > 0 and turkey_lines[-1].startswith('#EXTINF'):
                              add_buffered_lines(turkey_lines)
                          elif len(bein_lines) > 0 and bein_lines[-1].startswith('#EXTINF'):
                              add_buffered_lines(bein_lines)
                          else:
                              for country_list in other_lines.values():
                                  if len(country_list) > 0 and country_list[-1].startswith('#EXTINF'):
                                      add_buffered_lines(country_list)
                                      break
                          buffer_lines = []

                      include_next = False
                      current_group = re.search('group-title="([^"]+)"', line)
                      channel_name = re.search(',[[:space:]]*([^,\n]+)$', line)
                      
                      if current_group:
                          group = current_group.group(1)
                          original_country = group
                          translated_country = country_translations.get(group, group)
                          language = language_map.get(group, '')

                          # TVG etiketlerini ekle/güncelle
                          if 'tvg-country=' not in line:
                              line = line.replace('#EXTINF:-1', f'#EXTINF:-1 tvg-country="{translated_country}"')
                          elif 'tvg-country=' in line:
                              line = re.sub('tvg-country="[^"]*"', f'tvg-country="{translated_country}"', line)
                          if 'tvg-language=' not in line and language:
                              line = line.replace('#EXTINF:-1', f'#EXTINF:-1 tvg-language="{language}"')

                          # Grup başlığını Türkçeleştir
                          line = re.sub('group-title="[^"]*"', f'group-title="{translated_country} Spor Kanalları"', line)

                          if group == 'TURKEY':
                              include_next = True
                              turkey_lines.append(line)
                          elif 'bein' in line.lower():
                              include_next = True
                              bein_lines.append(line)
                          else:
                              include_next = True
                              if translated_country not in other_lines:
                                  other_lines[translated_country] = []
                              other_lines[translated_country].append(line)

                  elif (line.startswith('#EXTVLCOPT') or line.startswith('http')) and include_next:
                      buffer_lines.append(line)
                      if line.startswith('http'):
                          include_next = False

              # Son kanalın buffer'ını ekle
              if buffer_lines:
                  if len(turkey_lines) > 0 and turkey_lines[-1].startswith('#EXTINF'):
                      add_buffered_lines(turkey_lines)
                  elif len(bein_lines) > 0 and bein_lines[-1].startswith('#EXTINF'):
                      add_buffered_lines(bein_lines)
                  else:
                      for country_list in other_lines.values():
                          if len(country_list) > 0 and country_list[-1].startswith('#EXTINF'):
                              add_buffered_lines(country_list)
                              break

              # Önce Türkiye kanallarını ekle
              filtered_lines.extend(turkey_lines)
              
              # Sonra BeIN kanallarını ekle
              filtered_lines.extend(bein_lines)
              
              # Son olarak diğer ülkelerin kanallarını sıralı şekilde ekle
              for country_name in sorted(other_lines.keys()):
                  filtered_lines.extend(other_lines[country_name])
              
              write_file('dl/dl-daddyliveall.m3u', '\n'.join(filtered_lines))

          myway_content = fetch_m3u_content('https://surl.be/myway06')
          if myway_content:
              filtered_myway = process_myway_content(myway_content)
              write_file('forum/myway.m3u', filtered_myway)
          EOF

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dl/dl-daddyliveall.m3u forum/myway.m3u
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "♻️ Listeler güncellendi" -a
            git push
          )