              'MALAYSIA': 'Malezya',
              'PHILIPPINES': 'Filipinler',
              'SINGAPORE': 'Singapur',
              'AUSTRALIA': 'Avustralya',
              'NEW ZEALAND': 'Yeni Zelanda',
              'BRAZIL': 'Brezilya',
              'ARGENTINA': 'Arjantin',
              'CHILE': 'Şili',
