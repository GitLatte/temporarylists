              'SLOVAKIA': 'Slovakça',
              'BOSNIA AND HERZEGOVINA': 'Boşnakça',
              'ALBANIA': 'Arnavutça',
              'MACEDONIA': 'Makedonca',
              'MONTENEGRO': 'Karadağca',
              'RUSSIA': 'Rusça',
              'UKRAINE': 'Ukraynaca',
              'BELARUS': 'Belarusça',
              'ESTONIA': 'Estonca',
              'LATVIA': 'Letonca',
              'LITHUANIA': 'Litvanca',
              'QATAR': 'Arapça',
              'UNITED ARAB EMIRATES': 'Arapça',
              'SAUDI ARABIA': 'Arapça',
              'IRAN': 'Farsça',
              'ISRAEL': 'İbranice',
              'EGYPT': 'Arapça',
              'MOROCCO': 'Arapça',
              'TUNISIA': 'Arapça',
              'ALGERIA': 'Arapça',
              'AFRICA': 'İngilizce',
              'SOUTH AFRICA': 'İngilizce',
