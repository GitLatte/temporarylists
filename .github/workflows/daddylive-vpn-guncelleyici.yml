              'IRELAND': 'İrlanda'
          }

          language_map = {
              'TURKEY': 'Türkçe',
              'UNITED STATES': 'İngilizce',
              'UNITED KINGDOM': 'İngilizce',
              'GERMANY': 'Almanca',
              'FRANCE': 'Fransızca',
              'ITALY': 'İtalyanca',
              'SPAIN': 'İspanyolca',
              'NETHERLANDS': 'Hollandaca',
              'PORTUGAL': 'Portekizce',
              'BELGIUM': 'Hollandaca',
              'DENMARK': 'Danca',
              'NORWAY': 'Norveççe',
              'SWEDEN': 'İsveççe',
              'FINLAND': 'Fince',
              'AUSTRIA': 'Almanca',
              'SWITZERLAND': 'Almanca',
              'GREECE': 'Yunanca',
              'POLAND': 'Lehçe',
              'CZECH REPUBLIC': 'Çekçe',
              'HUNGARY': 'Macarca',
              'ROMANIA': 'Romence',
              'BULGARIA': 'Bulgarca',
              'CROATIA': 'Hırvatça',
              'SERBIA': 'Sırpça',
