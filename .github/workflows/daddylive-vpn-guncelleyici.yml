              'GREECE': 'Yunanistan',
              'POLAND': 'Polonya',
              'CZECH REPUBLIC': 'Çek Cumhuriyeti',
              'HUNGARY': 'Macaristan',
              'ROMANIA': 'Romanya',
              'BULGARIA': 'Bulgaristan',
              'CROATIA': 'Hırvatistan',
              'SERBIA': 'Sırbistan',
              'SLOVENIA': 'Slovenya',
              'SLOVAKIA': 'Slovakya',
              'BOSNIA AND HERZEGOVINA': 'Bosna Hersek',
              'ALBANIA': 'Arnavutluk',
              'MACEDONIA': 'Makedonya',
              'MONTENEGRO': 'Karadağ',
              'RUSSIA': 'Rusya',
              'UKRAINE': 'Ukrayna',
              'BELARUS': 'Belarus',
              'ESTONIA': 'Estonya',
              'LATVIA': 'Letonya',
              'LITHUANIA': 'Litvanya',
